# Chatbot CI/CD — 后端测试 + 前端 lint/build + RAG 评估
# Railway 部署通过 Railway 原生 GitHub 集成自动处理（非此 workflow 控制）
name: Chatbot CI

on:
  push:
    branches: [main]
    paths:
      - 'Chatbot/**'
      - '.github/workflows/chatbot.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Chatbot/**'
      - '.github/workflows/chatbot.yml'
  workflow_dispatch:
    inputs:
      run_rag_eval:
        description: 'Run full RAG evaluation pipeline'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # ── Backend: pytest（全部 mock，无需 API key） ──
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Chatbot/backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: Chatbot/backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short -x
        env:
          # 测试使用 mock，设空 key 避免意外调用
          LLM_API_KEY: ''
          LANGCHAIN_API_KEY: ''

  # ── Frontend: lint + TypeScript build ──
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Chatbot

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: Chatbot/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (typecheck + bundle)
        run: npm run build

  # ── RAG Eval（手动触发，需 Secrets） ──
  rag-eval:
    if: github.event_name == 'workflow_dispatch' && inputs.run_rag_eval
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Chatbot/backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: Chatbot/backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run RAG evaluation pipeline
        run: python scripts/run_eval_pipeline.py --ci --output eval_results.json
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2: 'true'
          LANGCHAIN_PROJECT: chatbot-rag

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: Chatbot/backend/eval_results.json
