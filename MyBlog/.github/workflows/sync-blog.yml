name: Sync Blog to Aureon Knowledge Base

on:
  push:
    paths:
      - 'client/src/content/posts/**/*.md'
  workflow_dispatch:  # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Sync to Aureon
        run: python scripts/sync_to_aureon.py
        env:
          AUREON_API_URL: ${{ secrets.AUREON_API_URL }}
          AUREON_API_KEY: ${{ secrets.AUREON_API_KEY }}
